name: Auto Update Container Image (Improved)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:                     # 新增：代码推送时触发
    branches:
      - main               # 监听 main 分支的推送

env:
  REGISTRY: "registry.cn-hangzhou.aliyuncs.com"  # 阿里云 ACR 地址
  IMAGE_NAME: venssy/clawpanel-openclaw-hermes
  BASE_IMAGE: justlikemaki/openclaw-docker-cn-im:latest
  TARGET_TAG: latest

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 6. 登录阿里云 ACR
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 设置 Docker Buildx 以支持多平台构建
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
