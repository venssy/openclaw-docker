name: Auto Update Container Image (Improved)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:                     # 新增：代码推送时触发
    branches:
      - main               # 监听 main 分支的推送

env:
  REGISTRY: "registry.cn-hangzhou.aliyuncs.com"  # 阿里云 ACR 地址
  IMAGE_NAME: venssy/openclaw
  BASE_IMAGE: justlikemaki/openclaw-docker-cn-im:latest
  TARGET_TAG: official

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 6. 登录阿里云 ACR
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 设置 Docker Buildx 以支持多平台构建
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compare digests and build if changed
        if: ${{ github.event_name == 'push' || env.PREVIOUS_DIGEST == 'none' || env.CURRENT_DIGEST != env.PREVIOUS_DIGEST }}
        run: |
          # 保存当前摘要供下次使用
          echo "${{ env.CURRENT_DIGEST }}" > .base-image-digest
          
          # 构建新镜像V1
          # docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }} \
          #   --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }} \
          #   .

          # 推送新镜像V1
          # docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }}

          # 构建镜像（使用 BuildKit 缓存）
          docker buildx build \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }} \
            --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }} \
            --cache-from "type=gha" \
            --cache-to "type=gha,mode=max" \
            --push \
            .

          # 移动缓存文件（避免缓存过大）
          # rm -rf /tmp/.buildx-cache
          # mv /tmp/.buildx-cache-new /tmp/.buildx-cache

          echo "New image built and pushed with tag ${{ env.TARGET_TAG }}"

