name: Auto Update Container Image (Improved)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:                     # 新增：代码推送时触发
    branches:
      - main               # 监听 main 分支的推送
    paths:                  # 仅监听以下文件变更
      - 'Dockerfile'
      - '.github/workflows/*.yml'

env:
  REGISTRY: "registry.cn-hangzhou.aliyuncs.com"  # 阿里云 ACR 地址
  IMAGE_NAME: venssy/openclaw
  BASE_IMAGE: openclaw/openclaw:latest
  TARGET_TAG: official

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 6. 登录阿里云 ACR
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Get current base image digest
        id: get-current-digest
        run: | 
          echo "CURRENT_DIGEST=$(docker manifest inspect ${{ env.BASE_IMAGE }} | jq -r '.[0].Digest')" >> $GITHUB_ENV

      - name: Get previous base image digest from file
        id: get-previous-digest
        run: |
          # 尝试从文件读取之前的摘要
          if [ -f .base-image-digest ]; then
            echo "PREVIOUS_DIGEST=$(cat .base-image-digest)" >> $GITHUB_ENV
          else
            echo "PREVIOUS_DIGEST=none" >> $GITHUB_ENV
          fi

      # 缓存 Docker 构建层（BuildKit 缓存）
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}  # 替换为你的依赖文件
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
          buildkitd-flags: --debug

      - name: Compare digests and build if changed
        if: ${{ github.event_name == 'push' || env.PREVIOUS_DIGEST == 'none' || env.CURRENT_DIGEST != env.PREVIOUS_DIGEST }}
        run: |
          # 保存当前摘要供下次使用
          echo "${{ env.CURRENT_DIGEST }}" > .base-image-digest
          
          # 构建新镜像V1
          # docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }} \
          #   --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }} \
          #   .

          # 推送新镜像V1
          # docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }}

          # 构建镜像（使用 BuildKit 缓存）
          docker buildx build \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TARGET_TAG }} \
            --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }} \
            --cache-from "type=local,src=/tmp/.buildx-cache" \
            --cache-to "type=local,dest=/tmp/.buildx-cache-new" \
            --push \
            .

          # 移动缓存文件（避免缓存过大）
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

          echo "New image built and pushed with tag ${{ env.TARGET_TAG }}"

      - name: No update needed
        if: ${{ github.event_name != 'push' && env.PREVIOUS_DIGEST != 'none' && env.CURRENT_DIGEST == env.PREVIOUS_DIGEST }}
        run: echo "Base image has not changed, no build needed."